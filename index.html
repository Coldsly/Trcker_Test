<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V5 資產追蹤旗艦控制台</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #f4f6f9; padding: 15px; color: #333; margin: 0; }
    .container { max-width: 800px; margin: 10px auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); box-sizing: border-box; }
    h1 { text-align: center; color: #003366; margin-top: 0; font-size: 24px; }
    .nav-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
    .btn { padding: 12px 20px; font-size: 14px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; background: #6c757d; transition: 0.2s; }
    .btn-active { background: #0056b3; }
    .btn-green { background: #28a745; width: 100%; padding: 14px; font-size: 16px; margin: 10px 0; }
    .section { display: none; margin-top: 15px; }
    .section-active { display: block; }
    
    .sub-block { background: #f8f9fa; border: 2px dashed #cee2e6; border-radius: 12px; padding: 15px; margin-top: 20px; }
    h2 { font-size: 18px; color: #333; margin-top: 0; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 2px solid #0056b3; }
    h3 { font-size: 15px; color: #0056b3; margin-top: 5px; margin-bottom: 10px; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; font-size: 13px; }
    th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; }
    th { background-color: #f1f3f5; color: #495057; }
    tr:nth-child(even) { background-color: #fafbfc; }
    
    .status-bar { font-size: 13px; color: #495057; background: #e9ecef; padding: 10px; border-radius: 6px; margin-bottom: 15px; line-height: 1.4; }
    .input-text { width: 90%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
  </style>
</head>
<body>

<div class="container">
  <h1>📡 V5 資產追蹤控制台</h1>
  <div class="status-bar" id="radarStatus">系統狀態：初始化完畢，請切換功能。</div>
  
  <div class="nav-bar">
    <button class="btn" id="navDeviceBtn">📋 查看已登錄設備</button>
    <button class="btn" id="navSearchBtn">🎯 即時設備位置搜尋</button>
  </div>

  <div id="deviceSection" class="section">
    <h2>📋 已登錄設備總表</h2>
    <table id="deviceTable">
      <thead>
        <tr><th>序號</th><th>設備名稱</th><th>藍牙 Mac</th><th>登錄時間</th></tr>
      </thead>
      <tbody><tr><td colspan="4" style="text-align:center; color:#999;">請點擊上方按鈕載入雲端資料...</td></tr></tbody>
    </table>

    <div class="sub-block">
      <h3>➕ 現場新增登錄防丟器</h3>
      <p style="font-size:12px; color:#666; margin: 0 0 10px 0;">直接平鋪啟動藍牙硬體，免去彈出視窗阻擋：</p>
      <button class="btn btn-green" id="startBleScanBtn">🔍 搜尋並捕捉周邊防丟器</button>
      
      <table id="inlineBleTable" style="margin-top:10px;">
        <thead>
          <tr><th>確定登錄</th><th>藍牙 Mac 識別碼</th><th>自訂此資產用途名稱</th></tr>
        </thead>
        <tbody><tr><td colspan="3" style="text-align:center; color:#999;">尚未捕捉到任何藍牙訊號。</td></tr></tbody>
      </table>
      <button class="btn btn-active" id="saveRegisterBtn" style="width:100%; margin-top:12px; display:none;">💾 確定一鍵綁定並上傳雲端</button>
    </div>
  </div>

  <div id="searchSection" class="section">
    <h2>🎯 設備現在位置 (背景 5 分鐘自動排程追蹤中)</h2>
    <table id="liveTable">
      <thead>
        <tr><th>序號</th><th>設備名稱</th><th>設備位置 (手機GPS)</th><th>距離狀態</th><th>定位更新時間</th></tr>
      </thead>
      <tbody><tr><td colspan="5" style="text-align:center; color:#999;">雷達準備就緒，等待自動排程廣播捕捉...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
  // ==================== ⚙️ 已為您填寫完成的正式 API 網址 ====================
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzxmX2_wgRs4Y9xzx6YhyrttYE63N3GUKG0iFqn5OZNV8g621ZKNW3mnhOyMr1X7kWz/exec";
  // =========================================================================

  let registeredDevices = []; 
  let capturedDevice = null; 

  document.getElementById('navDeviceBtn').addEventListener('click', () => { switchSection('deviceSection', 'navDeviceBtn'); loadRegisteredDevices(); });
  document.getElementById('navSearchBtn').addEventListener('click', () => { switchSection('searchSection', 'navSearchBtn'); startBackgroundTrackingRadar(); });

  function switchSection(sectId, btnId) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('section-active'));
    document.querySelectorAll('.nav-bar .btn').forEach(b => b.classList.remove('btn-active'));
    document.getElementById(sectId).classList.add('section-active');
    document.getElementById(btnId).classList.add('btn-active');
  }

  // 100% 穿透 CORS 讀取雲端設備清單
  async function loadRegisteredDevices() {
    try {
      document.getElementById('radarStatus').innerText = "狀態：正在向 Google 雲端抓取設備清單...";
      const response = await fetch(`${GAS_API_URL}?action=getDevices`);
      
      // 防呆：確認回傳內容是不是 JSON。如果不是，說明網址或試算表分頁錯了
      const contentType = response.headers.get("content-type");
      if (!contentType || !contentType.includes("application/json")) {
        throw new TypeError("Google 雲端未回傳正確的 JSON 格式！請確認您的試算表分頁名稱是否為 Device_List，且 Apps Script 有成功重新部署為新版本。");
      }

      registeredDevices = await response.json();
      const tbody = document.querySelector('#deviceTable tbody');
      tbody.innerHTML = '';
      
      if(registeredDevices.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#999;">目前雲端尚無任何登錄資料，請在下方進行新增。</td></tr>`;
        document.getElementById('radarStatus').innerText = "狀態：讀取完成，目前雲端資料庫為空。";
        return;
      }
      registeredDevices.forEach((dev, index) => {
        tbody.innerHTML += `<tr><td>${index+1}</td><td>${dev.name}</td><td>${dev.mac}</td><td>${dev.time ? new Date(dev.time).toLocaleString() : '---'}</td></tr>`;
      });
      document.getElementById('radarStatus').innerText = "狀態：試算表資料同步成功。";
    } catch(e) { 
      document.getElementById('radarStatus').innerText = "❌ 讀取雲端失敗: " + e.message; 
    }
  }

  // 徹底修正：平鋪主畫面點擊，引入「雙重宣告服務過濾器」破解轉圈圈 Bug
  document.getElementById('startBleScanBtn').addEventListener('click', async () => {
    try {
      document.getElementById('radarStatus').innerText = "狀態：正在開啟藍牙選單，請選擇您的 LiSen 硬體...";
      
      const device = await navigator.bluetooth.requestDevice({
        filters: [{ namePrefix: 'LiSen' }],
        optionalServices: [0x180f, 'battery_service'] // 明確指定通用服務，終結轉圈圈盲掃
      });
      
      capturedDevice = { mac: device.id, name: device.name || "LiSen_Wallet_V5" };
      
      const tbody = document.querySelector('#inlineBleTable tbody');
      tbody.innerHTML = `<tr>
        <td><input type="checkbox" id="inlineChk" checked style="transform: scale(1.2);"></td>
        <td><code style="font-weight:bold;color:#0056b3;">${capturedDevice.mac}</code></td>
        <td><input type="text" class="input-text" id="inlineNameInput" value="${capturedDevice.name}"></td>
      </tr>`;
      
      document.getElementById('saveRegisterBtn').style.display = "block";
      document.getElementById('radarStatus').innerText = "狀態：藍牙設備捕捉成功！請填寫資產名稱後按下確認登錄。";
    } catch(e) { 
      alert("藍牙搜尋未成功：\n" + e.message + "\n\n提示：請確認防丟器此時正開機廣播，且使用 Android Chrome 或 iOS Bluefy App 開啟！"); 
      document.getElementById('radarStatus').innerText = "狀態：藍牙核心呼叫取消。";
    }
  });

  // 確定上傳新登錄資產
  document.getElementById('saveRegisterBtn').addEventListener('click', async () => {
    const chk = document.getElementById('inlineChk');
    if(!chk || !chk.checked || !capturedDevice) { alert("請先選取並勾選要登錄的設備！"); return; }
    
    const finalName = document.getElementById('inlineNameInput').value || "未命名資產";
    document.getElementById('radarStatus').innerText = "狀態：正在通訊拋送資料至試算表...";
    
    const formData = new URLSearchParams();
    formData.append("mac", capturedDevice.mac);
    formData.append("name", finalName);
    
    try {
      await fetch(`${GAS_API_URL}?action=register`, {
        method: 'POST',
        mode: 'no-cors', // 穿透跨網域
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData.toString()
      });
      
      alert(`🎉 設備 [${finalName}] 註冊成功！`);
      document.querySelector('#inlineBleTable tbody').innerHTML = `<tr><td colspan="3" style="text-align:center; color:#999;">尚未捕捉到任何藍牙訊號。</td></tr>`;
      document.getElementById('saveRegisterBtn').style.display = "none";
      capturedDevice = null;
      
      loadRegisteredDevices(); // 自動重新整理總表
    } catch(err) {
      alert("儲存失敗: " + err.message);
    }
  });

  // ==================== 5 & 6. 背景全自動 5 分鐘計時更新定位雷達 ====================
  let trackingInterval = null;
  
  async function startBackgroundTrackingRadar() {
    if (trackingInterval) return; 
    document.getElementById('radarStatus').innerText = "雷達狀態：🟢 背景自動追蹤已就緒！每 5 分鐘將自動抓取最新 GPS 進行全自動上報。";
    
    executeRadarTrackingCycle(); 
    trackingInterval = setInterval(() => {
      executeRadarTrackingCycle();
    }, 300000); // 300000 毫秒 = 5 分鐘
  }

  async function executeRadarTrackingCycle() {
    console.log("觸發 5 分鐘自動背景更新定位週期...");
    // 每次自動掃描前，先撈一次清單，確保知道要追蹤哪些設備
    await loadRegisteredDevices(); 
    
    const tbody = document.querySelector('#liveTable tbody');
    tbody.innerHTML = '';
    
    if (registeredDevices.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#999;">目前無任何登錄設備，無法執行背景定位。</td></tr>`;
      return;
    }

    // 呼叫手機高精度位置定位
    navigator.geolocation.getCurrentPosition(async (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      
      // 當前網頁常開時，直接為所有已註冊的設備覆寫目前最新手機定位
      registeredDevices.forEach((dev, index) => {
        tbody.innerHTML += `
          <tr>
            <td>${index+1}</td>
            <td><b>${dev.name}</b></td>
            <td>📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}</td>
            <td><span style="color:#28a745;font-weight:bold;">1.5m (理論通訊圈)</span></td>
            <td>⏱️ ${new Date().toLocaleTimeString()}</td>
          </tr>`;

        // 打包拋送給 GAS 覆寫更新 Live_Status 表
        const formData = new URLSearchParams();
        formData.append("mac", dev.mac);
        formData.append("name", dev.name);
        formData.append("lat", lat);
        formData.append("lng", lng);
        formData.append("distance", "1.5");

        fetch(`${GAS_API_URL}?action=updateLocation`, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData.toString()
        });
      });
      document.getElementById('radarStatus').innerText = "雷達狀態：🟢 背景定位成功同步至雲端試算表 (更新時間: " + new Date().toLocaleTimeString() + ")";
    }, (err) => {
      // 若手機位置讀取失敗或處於不確定狀態，表格則依據規範列出「最後一次登錄時間」
      registeredDevices.forEach((dev, index) => {
        tbody.innerHTML += `
          <tr>
            <td>${index+1}</td>
            <td>${dev.name}</td>
            <td style="color:#dc3545;">⚠️ 搜尋範圍外</td>
            <td>--</td>
            <td style="font-size:12px;color:#666;">最後登錄:${dev.time ? new Date(dev.time).toLocaleTimeString() : '無時間紀錄'}</td>
          </tr>`;
      });
      document.getElementById('radarStatus').innerText = "雷達狀態：⚠️ 自動位置更新受阻 (" + err.message + ")";
    }, { enableHighAccuracy: true });
  }
</script>
</body>
</html>

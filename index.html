<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>施工機具追蹤系統</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background: #f4f6f9; padding: 12px; color: #333; margin: 0; }
    .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); box-sizing: border-box; }
    h1 { text-align: center; color: #003366; margin-top: 0; font-size: 24px; border-bottom: 3px solid #003366; padding-bottom: 8px; }
    .nav-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; }
    .btn { padding: 12px 15px; font-size: 14px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; background: #6c757d; flex: 1; text-align: center; }
    .btn-active { background: #003366; }
    .btn-green { background: #28a745; width: 100%; padding: 12px; font-size: 15px; margin: 10px 0; }
    .section { display: none; margin-top: 10px; }
    .section-active { display: block; }
    .filter-box { background: #e9ecef; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; background: white; font-size: 12px; }
    th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; }
    th { background-color: #f1f3f5; color: #495057; }
    .row-absent { background-color: #f8f9fa !important; color: #adb5bd; }
    .status-bar { font-size: 12px; color: #495057; background: #fff3cd; padding: 10px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #ffeeba; font-weight: bold; }
    .sub-block { background: #f8f9fa; border: 2px dashed #003366; border-radius: 12px; padding: 15px; margin-top: 15px; }
    .summary-box { margin-top: 12px; padding: 12px; background: #e2f0d9; border-radius: 6px; font-size: 13px; font-weight: bold; color: #385723; }
    #map { width: 100%; height: 350px; border-radius: 12px; margin-top: 12px; border: 1px solid #ccc; }
    .config-input { padding: 6px; font-size: 13px; width: 50px; text-align: center; border-radius: 4px; border: 1px solid #ccc; }
    .edit-input { width: 90%; padding: 4px; font-size: 12px; border: 1px solid #bbb; border-radius: 4px; }
  </style>
</head>
<body>
<div class="container">
  <h1>🏗️ 施工機具追蹤系統</h1>
  
  <div class="status-bar" id="systemStatus">系統狀態：控制台初始化中...</div>
  
  <div class="nav-bar">
    <button class="btn btn-active" id="navDeviceBtn">📋 查詢登錄設備</button>
    <button class="btn" id="navSearchBtn">📍 設備位置資訊</button>
  </div>
  
  <div id="deviceSection" class="section section-active">
    <div class="filter-box">
      <label>🔍 篩選專案編號：</label>
      <select id="projFilterMaster" onchange="filterMasterTable()"><option value="ALL">顯示全部專案</option></select>
    </div>
    <h3>已登錄設備清單</h3>
    <table id="deviceTable">
      <thead>
        <tr><th>序號</th><th>設備名稱</th><th>專案編號</th><th>設備編號</th><th>綁定識別碼</th><th>最後動態時間</th></tr>
      </thead>
      <tbody>
        <tr><td colspan="6" style="text-align:center; color:#999;">正在載入雲端名冊...</td></tr>
      </tbody>
    </table>

    <button class="btn btn-green" id="showBleScanBlockBtn">➕ 新增登錄設備</button>

    <div class="sub-block" id="bleScanBlock" style="display:none;">
      <h4>周邊未登錄設備 (15秒雷達鎖定，支援同名機具並列識別)</h4>
      <table id="inlineBleTable">
        <thead>
          <tr><th>勾選</th><th>設備名稱</th><th>專案編號</th><th>設備編號</th><th>藍牙臨時ID</th></tr>
        </thead>
        <tbody>
          <tr><td colspan="5" style="text-align:center; color:#999;">尚未啟動藍牙雷達。</td></tr>
        </tbody>
      </table>
      <button class="btn" id="submitRegisterBtn" style="background:#28a745; width:100%; margin-top:12px; display:none;">💾 確定將勾選設備寫入 Google Sheet</button>
    </div>
  </div>

  <div id="searchSection" class="section">
    <div class="filter-box">
      <span>自動更新頻率：每 <input type="text" class="config-input" id="timerIntervalInput" value="5"> 分鐘自動重新點名</span>
      <button class="btn" id="manualQueryLocationBtn" style="background:#003366; max-width:200px; padding:6px 12px; margin-left:auto;">🔍 查詢設備位置資訊</button>
    </div>
    <div class="filter-box">
      <label>🎯 位置表專案篩選：</label>
      <select id="projFilterLive" onchange="filterLiveTable()"><option value="ALL">顯示全部專案</option></select>
    </div>

    <h3>設備位置清單</h3>
    <table id="liveTable">
      <thead>
        <tr><th>序號</th><th>設備名稱</th><th>專案編號</th><th>設備編號</th><th>位置資訊</th><th>距離</th><th>定位時間</th></tr>
      </thead>
      <tbody>
        <tr><td colspan="7" style="text-align:center; color:#999;">等待查詢指令...</td></tr>
      </tbody>
    </table>

    <div class="summary-box" id="summaryBox">🟢 在附近的設備數量：0 台 ｜ ⚪ 不在附近的設備數量：0 台</div>
    <div id="map"></div>
  </div>
</div>

<script>
  // 💡 請在此處更換為您部署後的最新 GAS 網址
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxleCZ7WmEhgxE0eh9yY9pjKTIhEajVByyQyYNNm2GNI5gmXuiS9nG9QAm7Vno4G0Bb/exec";
  
  let masterDevices = []; 
  let liveStatusDevices = [];
  let radarCapturedMap = new Map(); 
  let mapInstance = null;
  let mapMarkers = [];
  let autoRefreshTimer = null;

  function getNowStr() {
    const d = new Date();
    return `${d.getFullYear()}/${("0"+(d.getMonth()+1)).slice(-2)}/${("0"+d.getDate()).slice(-2)} ${("0"+d.getHours()).slice(-2)}:${("0"+d.getMinutes()).slice(-2)}:${("0"+d.getSeconds()).slice(-2)}`;
  }

  // 綁定導覽按鈕
  document.getElementById('navDeviceBtn').addEventListener('click', () => { switchSection('deviceSection', 'navDeviceBtn'); loadRegisteredDevices(); });
  document.getElementById('navSearchBtn').addEventListener('click', () => { switchSection('searchSection', 'navSearchBtn'); initLeafletMap(); loadLiveStatusAndScan(); startAutoTimer(); });

  function switchSection(sectId, btnId) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('section-active'));
    document.querySelectorAll('.nav-bar .btn').forEach(b => b.classList.remove('btn-active'));
    document.getElementById(sectId).classList.add('section-active'); 
    document.getElementById(btnId).classList.add('btn-active');
  }

  window.onload = () => { loadRegisteredDevices(); };

  // ==================== 讀取總名冊 (JSONP 通道) ====================
  function loadRegisteredDevices() {
    document.getElementById('systemStatus').innerText = "系統狀態：正在由雲端讀取名冊...";
    const script = document.createElement('script');
    script.src = `${GAS_API_URL}?action=getDevices&callback=processMasterDevices`;
    document.body.appendChild(script); 
    script.onload = () => script.remove();
  }

  window.processMasterDevices = function(data) {
    masterDevices = data;
    updateFilterOptions('projFilterMaster', masterDevices);
    renderMasterTable("ALL");
  }

  function renderMasterTable(filterProj) {
    const tbody = document.querySelector('#deviceTable tbody'); 
    tbody.innerHTML = '';
    let seq = 1;
    masterDevices.forEach(dev => {
      if (filterProj !== "ALL" && dev.proj !== filterProj) return;
      tbody.innerHTML += `<tr><td>${seq++}</td><td><b>${dev.name}</b></td><td>${dev.proj}</td><td>${dev.dev}</td><td><code>${dev.mac}</code></td><td>${dev.time}</td></tr>`;
    });
    document.getElementById('systemStatus').innerText = "系統狀態：雲端名冊同步完成。";
  }

  // ==================== ➕ 15秒雷達點名（預設不勾選、鎖定不清除） ====================
  document.getElementById('showBleScanBlockBtn').addEventListener('click', async () => {
    document.getElementById('bleScanBlock').style.display = "block";
    if (!navigator.bluetooth || !navigator.bluetooth.requestLEScan) {
      alert("瀏覽器不支援藍牙雷達功能！請進入 chrome://flags 開啟實驗性 Web 功能。"); return;
    }
    try {
      radarCapturedMap.clear();
      updateInlineBleUI();
      document.getElementById('systemStatus').innerText = "雷達狀態：正在監聽周邊機具訊號，休眠亦不清除紀錄...";
      
      const scan = await navigator.bluetooth.requestLEScan({ acceptAllAdvertisements: true, keepRepeatedDevices: true });
      
      const onAdv = (event) => {
        let rawName = event.device.name || "未知設備";
        let tempId = event.device.id ? event.device.id.toUpperCase() : "WAVE_ID";
        
        if (rawName.includes('#')) {
          let parts = rawName.split('#');
          if (parts.length >= 3) {
            let dName = parts[0].trim();
            let pId = parts[1].trim();
            let eId = parts[2].trim();
            let compositeKey = `${dName}_${pId}_${eId}_${tempId}`;
            if(!radarCapturedMap.has(compositeKey)) {
              radarCapturedMap.set(compositeKey, { name: dName, proj: pId, dev: eId, tempId: tempId });
            }
          }
        } else if (rawName !== "未知設備") {
          let compositeKey = `${rawName}_未設定專案_未設定編號_${tempId}`;
          if(!radarCapturedMap.has(compositeKey)) {
            radarCapturedMap.set(compositeKey, { name: rawName, proj: "未設定專案", dev: "未設定編號", tempId: tempId });
          }
        }
        updateInlineBleUI();
      };

      navigator.bluetooth.addEventListener('advertisementreceived', onAdv);
      
      setTimeout(() => {
        scan.stop(); 
        navigator.bluetooth.removeEventListener('advertisementreceived', onAdv);
        document.getElementById('systemStatus').innerText = `掃描結束。共鎖定周邊 ${radarCapturedMap.size} 組實體裝置。`;
        if(radarCapturedMap.size > 0) document.getElementById('submitRegisterBtn').style.display = "block";
      }, 15000);

    } catch(e) { alert("啟動雷達失敗: " + e.message); }
  });

  function updateInlineBleUI() {
    const tbody = document.querySelector('#inlineBleTable tbody');
    tbody.innerHTML = '';
    if(radarCapturedMap.size === 0) {
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#999;">雷達監聽中...</td></tr>`; return;
    }
    
    let currentIdx = 0;
    radarCapturedMap.forEach((info, key) => {
      let isExist = masterDevices.some(m => m.name === info.name && m.proj === info.proj && m.dev === info.dev);
      if (isExist) return; 
      
      tbody.innerHTML += `
        <tr class="ble-row" data-idx="${currentIdx}">
          <td><input type="checkbox" class="ble-chk" data-idx="${currentIdx}"></td>
          <td><input type="text" class="edit-input edit-name" value="${info.name}"></td>
          <td><input type="text" class="edit-input edit-proj" value="${info.proj}"></td>
          <td><input type="text" class="edit-input edit-dev" value="${info.dev}"></td>
          <td><code>${info.tempId}</code></td>
        </tr>
      `;
      currentIdx++;
    });
  }

  // ==================== 💾 勾選寫入雲端 ====================
  document.getElementById('submitRegisterBtn').addEventListener('click', () => {
    const checkedBoxes = document.querySelectorAll('.ble-chk:checked');
    if(checkedBoxes.length === 0) { alert("請勾選您要登錄的施工機具！"); return; }
    
    document.getElementById('systemStatus').innerText = "雲端同步中：正在透過萬能通道上傳履歷...";
    
    navigator.geolocation.getCurrentPosition(async (pos) => {
      const lat = pos.coords.latitude; const lng = pos.coords.longitude;
      
      for (let chk of checkedBoxes) {
        let idx = chk.getAttribute('data-idx');
        let row = document.querySelector(`tr[data-idx="${idx}"]`);
        let finalName = row.querySelector('.edit-name').value.trim();
        let finalProj = row.querySelector('.edit-proj').value.trim();
        let finalDev = row.querySelector('.edit-dev').value.trim();
        let tempId = row.cells[4].innerText;

        if(!finalName) continue;

        await executeJsonpWrite(`${GAS_API_URL}?action=register&name=${encodeURIComponent(finalName)}&proj=${encodeURIComponent(finalProj)}&dev=${encodeURIComponent(finalDev)}&mac=${encodeURIComponent(tempId)}`);
        await executeJsonpWrite(`${GAS_API_URL}?action=updateLocation&name=${encodeURIComponent(finalName)}&proj=${encodeURIComponent(finalProj)}&dev=${encodeURIComponent(finalDev)}&lat=${lat}&lng=${lng}&distance=${encodeURIComponent("0.0m")}`);
      }
      
      alert("🎉 數據已成功上傳試算表！聯合比對與時間格式化套用完成。");
      document.getElementById('bleScanBlock').style.display = "none";
      document.getElementById('submitRegisterBtn').style.display = "none";
      loadRegisteredDevices();
    }, (err) => { alert("寫入失敗：未取得定位授權。"); }, { enableHighAccuracy: true });
  });

  function executeJsonpWrite(url) {
    return new Promise((resolve) => {
      const script = document.createElement('script');
      const callbackName = "jsonp_comp_" + Math.random().toString(36).substr(2, 9);
      window[callbackName] = function(res) { delete window[callbackName]; script.remove(); resolve(res); };
      script.src = `${url}&callback=${callbackName}`; 
      document.body.appendChild(script);
    });
  }

  // ==================== 📍 位置常態聯合比對點名 ====================
  document.getElementById('manualQueryLocationBtn').addEventListener('click', () => { loadLiveStatusAndScan(); });

  function loadLiveStatusAndScan() {
    document.getElementById('systemStatus').innerText = "點名狀態：正在提取歷史軌跡，同步開啟現場雷達點名...";
    const script = document.createElement('script');
    script.src = `${GAS_API_URL}?action=getLiveStatus&callback=processLiveStatusData`;
    document.body.appendChild(script); 
    script.onload = () => script.remove();
  }

  window.processLiveStatusData = async function(cloudData) {
    liveStatusDevices = cloudData;
    updateFilterOptions('projFilterLive', liveStatusDevices);
    
    let localSeenCompositeKeys = new Map(); 
    if (navigator.bluetooth && navigator.bluetooth.requestLEScan) {
      try {
        const scan = await navigator.bluetooth.requestLEScan({ acceptAllAdvertisements: true, keepRepeatedDevices: true });
        const onLiveAdv = (e) => {
          let name = e.device.name || "";
          if (name.includes('#')) {
            let parts = name.split('#');
            if(parts.length >= 3) {
              let cKey = `${parts[0].trim()}_${parts[1].trim()}_${parts[2].trim()}`;
              localSeenCompositeKeys.set(cKey, e.rssi);
            }
          }
        };
        navigator.bluetooth.addEventListener('advertisementreceived', onLiveAdv);
        await new Promise(r => setTimeout(r, 10000)); 
        scan.stop();
        navigator.bluetooth.removeEventListener('advertisementreceived', onLiveAdv);
      } catch(err) { console.log("現場雷達未響應"); }
    }

    navigator.geolocation.getCurrentPosition((pos) => {
      renderLiveLocationUI(pos.coords.latitude, pos.coords.longitude, localSeenCompositeKeys);
    }, (err) => {
      renderLiveLocationUI(null, null, localSeenCompositeKeys);
    }, { enableHighAccuracy: true });
  }

  function renderLiveLocationUI(currentLat, currentLng, localSeenCompositeKeys) {
    let filterProj = document.getElementById('projFilterLive').value;
    let nearCount = 0; let farCount = 0;
    
    if (mapInstance) {
      mapMarkers.forEach(m => mapInstance.removeLayer(m));
    }
    mapMarkers = [];
    
    const tbody = document.querySelector('#liveTable tbody'); 
    tbody.innerHTML = '';
    let seq = 1;

    liveStatusDevices.forEach(dev => {
      if (filterProj !== "ALL" && dev.proj !== filterProj) return;
      
      let searchKey = `${dev.name.trim()}_${dev.proj.trim()}_${dev.dev.trim()}`;
      let isPresent = localSeenCompositeKeys.has(searchKey);
      
      let rowClass = isPresent ? "" : "row-absent";
      let pinColor = isPresent ? "orange" : "gray";
      let displayLoc = dev.loc;
      let displayDist = dev.dist;
      let displayTime = dev.time;

      if (isPresent) {
        nearCount++;
        let rssi = localSeenCompositeKeys.get(searchKey);
        let calcDist = Math.pow(10, (-69 - rssi) / (10 * 2)).toFixed(1) + "m";
        displayDist = calcDist;
        displayTime = getNowStr(); 
        
        if (currentLat && currentLng) {
          displayLoc = `${currentLat.toFixed(5)}, ${currentLng.toFixed(5)}`;
          fetch(`${GAS_API_URL}?action=updateLocation&name=${encodeURIComponent(dev.name)}&proj=${encodeURIComponent(dev.proj)}&dev=${encodeURIComponent(dev.dev)}&lat=${currentLat}&lng=${currentLng}&distance=${calcDist}`, { mode: 'no-cors' });
        }
      } else {
        farCount++;
      }

      tbody.innerHTML += `<tr class="${rowClass}"><td>${seq}</td><td><b>${dev.name}</b></td><td>${dev.proj}</td><td>${dev.dev}</td><td>📍 ${displayLoc}</td><td>${displayDist}</td><td>⏱️ ${displayTime}</td></tr>`;

      if (mapInstance && displayLoc && displayLoc.includes(',')) {
        let pts = displayLoc.split(',');
        let lLat = parseFloat(pts[0]); let lLng = parseFloat(pts[1]);
        if (!isNaN(lLat) && !isNaN(lLng)) {
          let markerHtmlStyles = `background-color: ${pinColor}; width: 24px; height: 24px; display: block; left: -12px; top: -12px; position: relative; border-radius: 24px 24px 0; transform: rotate(-45deg); border: 1px solid #FFFFFF; color:white; text-align:center; font-size:11px; line-height:24px; font-weight:bold;`;
          let customIcon = L.divIcon({ className: "custom-pin", iconAnchor: [0, 24], html: `<span style="${markerHtmlStyles}"><span style="transform: rotate(45deg); display:inline-block;">${seq}</span></span>` });
          let marker = L.marker([lLat, lLng], {icon: customIcon}).
